<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F4FB"></stop>
      <stop offset="100%" stop-color="#CFE9F4"></stop>
    </linearGradient>
    <pattern id="stripes" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#A7CEE2" stroke-width="1" opacity="0.5"></line>
    </pattern>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"></rect>
  <rect width="800" height="1000" fill="url(#stripes)"></rect>
  <g font-family="ui-monospace, Menlo, monospace" fill="#0B2A4A" opacity="0.55">
    <text x="400" y="490" text-anchor="middle" font-size="22" font-weight="600">[ hero photo ]</text>
    <text x="400" y="520" text-anchor="middle" font-size="14">paciente sorrindo - ambiente clínico</text>
    <text x="400" y="540" text-anchor="middle" font-size="14">substituir por imagem da LP atual</text>
  </g>
</svg>